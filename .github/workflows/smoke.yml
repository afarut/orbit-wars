# Smoke-тесты архитектуры (smoke_test.py): формы/маски forward, set-инвариантность,
# intercept, geo_lite, валидность act(). Нужны только numpy + torch (+ локальный
# orbit_lite) — НЕ весь requirements.txt (без kaggle-environments/jax/transformers).
# torch ставится CPU-only + кэшируется → прогон ~30-60с после первого раза.
name: smoke

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "model.py"
      - "smoke_test.py"
      - "producer-orbit-wars-utils/**"
      - "requirements.txt"
      - ".github/workflows/smoke.yml"
  pull_request:
    paths:
      - "core/**"
      - "model.py"
      - "smoke_test.py"
      - "producer-orbit-wars-utils/**"
      - "requirements.txt"
      - ".github/workflows/smoke.yml"

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # Узкое подмножество: torch берём CPU-only колесо (легче CUDA-сборки),
      # numpy — с PyPI. Версии синхронны с requirements.txt.
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy==2.4.6
          pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu

      # orbit_lite подхватывается фасадом core/geo_lite.py из producer-orbit-wars-utils/,
      # отдельная установка не нужна — запускаем из корня репо.
      - name: smoke_test
        run: python smoke_test.py
